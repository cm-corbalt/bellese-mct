services:
  ########################
  # Frontend UI
  ########################
  mct-frontend:
    image: example/frontend
    build:
      context: ../frontend
    ports:
      - "3000:3000"

  ########################
  # Backend MCT
  ########################
  mct-backend:
    image: example/backend
    build:
      context: ../java
    ports:
      - "8088:8088"
    volumes:
      - mct-config:/app/config

  ########################
  # Facility A
  ########################
  facility-a:
    image: "hapiproject/hapi:latest"
    restart: always
    ports:
      - "8081:8080"
    environment:
      - HAPI_FHIR_SERVER_ADDRESS=http://localhost:8081/fhir
      - HAPI_FHIR_FHIR_VERSION=R4
      - HAPI_FHIR_TESTER_HOME_SERVER_ADDRESS=http://localhost:8081/fhir
      - HAPI_FHIR_OPENAPI_ENABLED=true


  ########################
  # Facility B
  ########################
  facility-b:
    image: "hapiproject/hapi:latest"
    restart: always
    ports:
      - "8082:8082"
    environment:
      - server.port=8082
      - HAPI_FHIR_SERVER_ADDRESS=http://localhost:8082/fhir
      - HAPI_FHIR_FHIR_VERSION=R4
      - HAPI_FHIR_TESTER_HOME_SERVER_ADDRESS=http://localhost:8082/fhir

volumes:
  mct-config:
